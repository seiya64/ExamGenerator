<header class="app-header border-bottom bg-white">
  <div class="container app-container py-3">
    <div class="app-header-inner">
      <span class="app-brand">{{ t('app.title') }}</span>
      <app-language-switcher />
    </div>
  </div>
</header>

<main class="container app-container py-4 py-md-5">
  <app-empty-state
    [eyebrow]="t('shell.statusEyebrow')"
    [title]="t('shell.statusTitle')"
    [body]="t('shell.statusBody')"
  />

  <router-outlet />
</main>
